# ──────────────────────────────────────────────
# dxjakes.com — Netlify Configuration
# Static editorial publishing object
# ──────────────────────────────────────────────

[build]
  publish = "."

# ── Security Headers (all pages) ──────────────
[[headers]]
  for = "/*"
  [headers.values]

    # Prevent clickjacking — no one should iframe your site
    X-Frame-Options = "DENY"

    # Stop MIME-type sniffing — serve what you declare
    X-Content-Type-Options = "nosniff"

    # Control referrer leakage — send origin only to external sites
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Lock down browser features you don't use
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"

    # Force HTTPS for 1 year + include subdomains
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Content Security Policy — tight allowlist for a static site
    # self for everything, inline styles (needed for inlined CSS), data: for SVG/images
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

    # Prevent cross-origin info leaks
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"

# ── Cache: HTML pages — no cache (always fresh) ──
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Cache: Images — long cache with revalidation ──
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache: Fonts — long cache ──
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Redirect: /words/ → / (deprecated archive route) ──
[[redirects]]
  from = "/words/"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/words"
  to = "/"
  status = 301
  force = true

# ── 404 fallback ──
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
  # No force = true, so this only fires when the path doesn't match a real file
