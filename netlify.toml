# ──────────────────────────────────────────────
# imjustdex.com — Netlify Configuration
# Static editorial publishing object
#
# Architecture notes:
#   • Strict CSP (self-only) — no inline scripts, no inline styles,
#     no third-party CDNs. All JS is in /js/*, all CSS in /css/*,
#     all fonts self-hosted in /fonts/*.
#   • Trailing-slash canonical on all article + about routes.
#   • Long cache + immutable for versioned static assets
#     (/css, /js, /fonts, /img). HTML stays no-cache.
#   • Deprecated TPH-era routes (ops, leadership prep, asana) are
#     gone from the editorial repo and redirect to /.
# ──────────────────────────────────────────────

[build]
  publish = "."

# ──────────────────────────────────────────────
# Security Headers (all pages)
# ──────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]

    # Prevent clickjacking — no one should iframe this site
    X-Frame-Options = "DENY"

    # Stop MIME-type sniffing — serve what you declare
    X-Content-Type-Options = "nosniff"

    # Control referrer leakage — send origin only to external sites
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Lock down browser features you don't use
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"

    # Force HTTPS for 1 year + include subdomains
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Content Security Policy — strict self-only.
    # No 'unsafe-inline' anywhere. No Google Fonts, no gstatic.
    # script-src 'self' — every script is in /js/*
    # style-src 'self'  — every stylesheet is in /css/*
    # font-src 'self'   — fonts are self-hosted in /fonts/*
    # img-src 'self' data: https: — allows SVG data URIs and any https image we hotlink
    # connect-src 'self' — no analytics/beacons allowed
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"

    # Prevent cross-origin info leaks
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"

# ──────────────────────────────────────────────
# Brand guide — scoped CSP override
# The /brand/ style guide is a living specimen. It renders
# swatches, demo frames, and one-off type samples via
# element-level inline style="..." attributes (36 of them,
# each unique to its demonstration). These cannot use the
# site-wide strict 'style-src self' without converting every
# demo into a single-use class, which would pollute brand.css
# with dozens of one-off rules that defeat the purpose of a
# specimen document.
#
# This override adds 'unsafe-inline' to style-src ONLY for
# /brand/*. script-src stays strict (inline scripts are
# extracted to /brand/brand.js). All other policies unchanged.
# ──────────────────────────────────────────────
[[headers]]
  for = "/brand/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"

# ──────────────────────────────────────────────
# Feed: correct Content-Type + no cache + relaxed CSP
# Browsers + feed readers both need application/xml.
# The XSL processing instruction in feed.xml triggers
# the browser to apply feed.xsl for human-readable rendering.
# XSL-transformed HTML uses inline styles because browsers
# strip <style> blocks from XSL output. The site-wide
# style-src 'self' would block those, so we add
# 'unsafe-inline' for this single route only.
# ──────────────────────────────────────────────
[[headers]]
  for = "/feed.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"

# XSL stylesheet — same relaxed CSP as feed.xml
[[headers]]
  for = "/feed.xsl"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"

# ──────────────────────────────────────────────
# Cache: HTML pages — no cache (always fresh)
# ──────────────────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ──────────────────────────────────────────────
# Cache: CSS — long cache, immutable
# Bust by filename if a breaking change is shipped.
# ──────────────────────────────────────────────
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ──────────────────────────────────────────────
# Cache: JS — long cache, immutable
# ──────────────────────────────────────────────
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ──────────────────────────────────────────────
# Cache: Fonts — long cache, immutable
# ──────────────────────────────────────────────
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# ──────────────────────────────────────────────
# Cache: Images — long cache, immutable
# ──────────────────────────────────────────────
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ──────────────────────────────────────────────
# Mailchimp subscribe proxy
# The site-wide CSP locks connect-src and form-action to 'self'.
# This 200-level proxy keeps the browser request same-origin while
# Netlify's edge forwards it to Mailchimp server-side.
# ──────────────────────────────────────────────
[[redirects]]
  from = "/api/subscribe"
  to = "https://imjustdex.us20.list-manage.com/subscribe/post"
  status = 200
  force = true

# ──────────────────────────────────────────────
# Trailing-slash canonical redirects
# Non-slash variants 301 to the slash canonical.
#
# CRITICAL: Do NOT add `force = true` to these rules.
# Netlify's path matcher treats `/about` and `/about/` as
# matching the same `from = "/about"` rule. With force=true,
# the rule fires on BOTH variants — creating an infinite
# redirect loop on the canonical slash URL.
#
# Without force, Netlify's Pretty URLs behavior serves
# /about/index.html directly when the trailing slash is
# present, and the redirect only fires for the non-slash
# variant. This is the canonical Netlify pattern.
# ──────────────────────────────────────────────
[[redirects]]
  from = "/about"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/words/the-nets"
  to = "/words/the-nets/"
  status = 301

[[redirects]]
  from = "/words/gumbo"
  to = "/words/gumbo/"
  status = 301

[[redirects]]
  from = "/words/price-of-sunday"
  to = "/words/price-of-sunday/"
  status = 301

[[redirects]]
  from = "/words/reckonings"
  to = "/words/reckonings/"
  status = 301


# ──────────────────────────────────────────────
# Deprecated archive root — /words and /words/
# The single-archive design lives at / now.
# ──────────────────────────────────────────────
[[redirects]]
  from = "/words/"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/words"
  to = "/"
  status = 301
  force = true

# ──────────────────────────────────────────────
# Removed TPH-era routes (moved out of editorial repo)
# These lived at imjustdex.com during the TPH prototype phase.
# Any remaining inbound links should land at home.
# ──────────────────────────────────────────────
[[redirects]]
  from = "/opsmeeting"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/opsmeeting/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/leadership-prep"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/leadership-prep/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/asana-workflow"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/asana-workflow/*"
  to = "/"
  status = 301
  force = true

# ──────────────────────────────────────────────
# 404 fallback
# Serves the custom branded 404.html with a proper 404 status.
# No force = true, so this only fires when the path doesn't
# match a real file.
# ──────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
